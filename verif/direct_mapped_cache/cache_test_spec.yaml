# This is the test spec for a cache


#######################################################################
#######################################################################
####
#### Test spec should support direct mapped for now
#### On hit the corresponding data should be written to the correct position
#### On miss there should be a stall and the cache should be written
#### on the next cycle
#### Things to be tested:
#### 
#### 1. Correct hit behavior
#### 2. Correct miss behavior
#### 3. Mixed scnenarios
#### 4. 
####
#######################################################################
#######################################################################


cache_hit_test:
 description: "This test is to repeatdely only hit scenarios that hit the cache"
 plusargs:
  - +UVM_VERBOSITY=UVM_LOW
  - +UVM_TESTNAME=cache_hit_test
  - +num_rd_cmds=100
  - +hit_test=1

cache_base_test:
  description: "This is just to test the cache randomly"
  plusargs:
    - +UVM_VERBOSITY=UVM_LOW
    # - -sv_seed = 1961982942
    - +UVM_TESTNAME=cache_base_test
    - +num_rd_cmds=100

